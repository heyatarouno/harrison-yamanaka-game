<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハリソン山中ゲーム</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
:root{
  --bg:#F6F3EC;
  --card:#FFFFFF;
  --border:#DDD6C5;
  --text:#221B12;
  --text-secondary:#7A7263;
  --accent:#B5472B;
  --accent-bg:#F4E2DA;
  --accent-text:#7A2C18;
  --success:#3F6B3F;
  --gold:#B8902E;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#1B1712;
    --card:#262019;
    --border:#3A3327;
    --text:#F1ECE1;
    --text-secondary:#A89F8C;
    --accent:#E07A52;
    --accent-bg:#3A2620;
    --accent-text:#F2B79A;
    --success:#7FBF7F;
    --gold:#D8B65A;
  }
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  display:flex;
  justify-content:center;
}
.wrap{ width:100%; max-width:480px; padding:24px 16px 60px; }
header{ text-align:center; margin-bottom:24px; }
header h1{ font-size:26px; font-weight:700; margin:0; letter-spacing:0.02em; }
.card{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px; }
.row{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-top:1px solid var(--border); }
.row:first-child{ border-top:none; }
.chip{ display:inline-flex; align-items:center; gap:6px; font-size:15px; padding:5px 12px; border-radius:8px; background:var(--accent-bg); color:var(--accent-text); }
.label{ font-size:15px; color:var(--text-secondary); margin:0 0 10px; }
.muted{ font-size:15px; color:var(--text-secondary); margin:0 0 12px; }
.t-accent{ color:var(--accent); }
.t-success{ color:var(--success); }
button{ cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:10px; padding:13px 16px; font-size:17px; font-family:inherit; transition:background .15s,border-color .15s; }
button:hover{ background:var(--accent-bg); }
button:active{ transform:scale(0.98); }
button:disabled{ opacity:0.4; cursor:not-allowed; transform:none; }
button.primary{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
button.primary:hover{ opacity:0.92; background:var(--accent); }
button.active{ background:var(--accent-bg); border-color:var(--accent); color:var(--accent-text); }
button.ghost{ border-color:transparent; background:transparent; color:var(--text-secondary); padding:7px 12px; font-size:15px; }
button.ghost:hover{ background:var(--accent-bg); color:var(--accent-text); }
input[type=text]{ width:100%; padding:12px 14px; border:1px solid var(--border); border-radius:10px; background:var(--card); color:var(--text); font-size:17px; font-family:inherit; }
input[type=text]:focus{ outline:2px solid var(--accent); outline-offset:1px; }
.field{ margin-bottom:12px; }
.field label{ display:block; font-size:15px; color:var(--text-secondary); margin-bottom:5px; }
</style>
</head>
<body>
<div class="wrap">
<header><h1>ハリソン山中ゲーム</h1></header>
<div id="app"></div>
</div>
<script src="app.js"></script>
</body>
</html>
